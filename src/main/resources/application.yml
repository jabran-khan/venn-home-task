spring:
  application:
    name: venn-home-task
  profiles:
    active: production
  datasource:
    url: jdbc:h2:mem:venndb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    org.springframework: WARN

server:
  port: 8083

app:
  limits:
    max-funds-per-day: 3
    daily-limit: 5000
    weekly-limit: 20000
